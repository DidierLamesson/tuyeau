<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- cream background -->
  <rect width="32" height="32" fill="#f5ecd9"/>

  <!-- handle (back loop) -->
  <rect x="3" y="9"  width="6" height="1" fill="#3d6b25"/>
  <rect x="3" y="10" width="1" height="4" fill="#3d6b25"/>
  <rect x="8" y="10" width="1" height="3" fill="#3d6b25"/>
  <rect x="3" y="13" width="2" height="1" fill="#3d6b25"/>

  <!-- lid -->
  <rect x="9"  y="10" width="6" height="1" fill="#3d6b25"/>
  <rect x="10" y="9"  width="4" height="1" fill="#5a8a3a"/>

  <!-- body (oval-ish) -->
  <rect x="5"  y="11" width="14" height="13" fill="#5a8a3a"/>
  <rect x="6"  y="11" width="12" height="1" fill="#9bbf6f"/>
  <rect x="5"  y="12" width="1"  height="11" fill="#3d6b25"/>
  <rect x="18" y="12" width="1"  height="11" fill="#3d6b25"/>
  <rect x="6"  y="23" width="12" height="1" fill="#3d6b25"/>
  <!-- darker corners -->
  <rect x="6"  y="11" width="1"  height="1" fill="#3d6b25"/>
  <rect x="17" y="11" width="1"  height="1" fill="#3d6b25"/>
  <rect x="6"  y="22" width="1"  height="1" fill="#3d6b25"/>
  <rect x="17" y="22" width="1"  height="1" fill="#3d6b25"/>
  <!-- highlight -->
  <rect x="7"  y="13" width="2"  height="1" fill="#9bbf6f"/>

  <!-- spout -->
  <rect x="19" y="13" width="6" height="3" fill="#5a8a3a"/>
  <rect x="19" y="13" width="6" height="1" fill="#9bbf6f"/>
  <rect x="19" y="15" width="6" height="1" fill="#3d6b25"/>
  <rect x="25" y="14" width="2" height="3" fill="#5a8a3a"/>
  <rect x="25" y="14" width="2" height="1" fill="#9bbf6f"/>
  <rect x="25" y="16" width="2" height="1" fill="#3d6b25"/>

  <!-- water drops -->
  <rect x="26" y="18" width="1" height="2" fill="#6fa8d6"/>
  <rect x="26" y="21" width="1" height="2" fill="#6fa8d6"/>
  <rect x="26" y="24" width="1" height="2" fill="#6fa8d6"/>
  <rect x="27" y="20" width="1" height="1" fill="#3a6f9c"/>
  <rect x="27" y="23" width="1" height="1" fill="#3a6f9c"/>
  <rect x="27" y="26" width="1" height="1" fill="#3a6f9c"/>

  <!-- outer outline -->
  <rect x="2"  y="9"  width="1"  height="6" fill="#2a2a2a"/>
  <rect x="3"  y="8"  width="6"  height="1" fill="#2a2a2a"/>
  <rect x="9"  y="8"  width="6"  height="1" fill="#2a2a2a"/>
  <rect x="9"  y="9"  width="1"  height="1" fill="#2a2a2a"/>
  <rect x="14" y="9"  width="1"  height="1" fill="#2a2a2a"/>
  <rect x="3"  y="14" width="2"  height="1" fill="#2a2a2a"/>
  <rect x="4"  y="10" width="1"  height="5" fill="#2a2a2a"/>
  <rect x="9"  y="10" width="1"  height="1" fill="#2a2a2a"/>
  <rect x="14" y="10" width="6"  height="1" fill="#2a2a2a"/>
  <rect x="4"  y="11" width="1"  height="1" fill="#2a2a2a"/>
  <rect x="4"  y="24" width="15" height="1" fill="#2a2a2a"/>
  <rect x="4"  y="11" width="1"  height="13" fill="#2a2a2a"/>
  <rect x="19" y="11" width="1"  height="2" fill="#2a2a2a"/>
  <rect x="19" y="16" width="1"  height="8" fill="#2a2a2a"/>
  <rect x="20" y="12" width="5"  height="1" fill="#2a2a2a"/>
  <rect x="25" y="13" width="1"  height="1" fill="#2a2a2a"/>
  <rect x="26" y="13" width="1"  height="1" fill="#2a2a2a"/>
  <rect x="27" y="14" width="1"  height="3" fill="#2a2a2a"/>
  <rect x="20" y="16" width="5"  height="1" fill="#2a2a2a"/>
  <rect x="25" y="17" width="2"  height="1" fill="#2a2a2a"/>
